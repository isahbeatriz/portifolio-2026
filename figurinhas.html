<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Figurinhas da Copa</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600&display=swap" rel="stylesheet">
  <style>
    body {
      margin: 0;
      font-family: 'Poppins', sans-serif;
      background: #0b6623;
      color: white;
    }
    header {
      background: #004d00;
      padding: 15px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    header h1 { margin: 0; }
    button {
      padding: 8px 15px;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }
    .login-btn { background: yellow; color: black; }

    .container {
      padding: 20px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 15px;
    }

    .card {
      background: white;
      color: black;
      border-radius: 10px;
      padding: 10px;
      text-align: center;
    }

    .card img {
      width: 100%;
      border-radius: 8px;
    }

    .hidden { display: none; }

    form {
      max-width: 300px;
      margin: auto;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    input {
      padding: 10px;
      border-radius: 5px;
      border: none;
    }

    .dashboard {
      text-align: center;
    }
  </style>
</head>
<body>

<header>
  <h1>⚽ Figurinhas da Copa</h1>
  <button class="login-btn" onclick="showLogin()">Login</button>
</header>

<div class="container">

  <div id="home">
    <h2>Complete seu álbum!</h2>
    <div class="grid" id="stickers"></div>
  </div>

  <div id="login" class="hidden">
    <h2>Login</h2>
    <form onsubmit="login(event)">
      <input type="email" id="email" placeholder="Email" required>
      <input type="password" id="password" placeholder="Senha" required>
      <button type="submit">Entrar</button>
    </form>
  </div>

  <div id="dashboard" class="hidden dashboard">
    <h2>Bem-vindo!</h2>
    <p id="userEmail"></p>
    <button onclick="logout()">Sair</button>
  </div>

</div>

<script>
  const stickers = [
    {name: "Neymar", img: "https://via.placeholder.com/150"},
    {name: "Messi", img: "https://via.placeholder.com/150"},
    {name: "Mbappé", img: "https://via.placeholder.com/150"},
    {name: "Cristiano Ronaldo", img: "https://via.placeholder.com/150"}
  ];

  const container = document.getElementById("stickers");

  stickers.forEach(s => {
    container.innerHTML += `
      <div class="card">
        <img src="${s.img}">
        <p>${s.name}</p>
      </div>
    `;
  });

  function showLogin() {
    document.getElementById("home").classList.add("hidden");
    document.getElementById("login").classList.remove("hidden");
  }

  function login(e) {
    e.preventDefault();
    const email = document.getElementById("email").value;
    localStorage.setItem("user", email);
    showDashboard();
  }

  function showDashboard() {
    document.getElementById("login").classList.add("hidden");
    document.getElementById("dashboard").classList.remove("hidden");
    document.getElementById("userEmail").innerText = localStorage.getItem("user");
  }

  function logout() {
    localStorage.removeItem("user");
    location.reload();
  }

  if(localStorage.getItem("user")) {
    showDashboard();
  }
</script>

</body>
</html>
