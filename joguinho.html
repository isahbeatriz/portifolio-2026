<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Banana Monkey</title>
  <style>
    body {
      margin: 0;
      background: black;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      overflow: hidden;
    }
    canvas {
      background: #111;
      border: 3px solid yellow;
    }
  </style>
</head>
<body>
  <canvas id="gameCanvas" width="600" height="600"></canvas>
  <audio id="eatSound" src="https://actions.google.com/sounds/v1/cartoon/pop.ogg"></audio>
  <audio id="gameOverSound" src="https://actions.google.com/sounds/v1/cartoon/clang_and_wobble.ogg"></audio>

  <script>
    const canvas = document.getElementById("gameCanvas");
    const ctx = canvas.getContext("2d");

    const tileSize = 30;
    const rows = canvas.height / tileSize;
    const cols = canvas.width / tileSize;

    // Macaco
    let monkey = { x: 1, y: 1, dx: 0, dy: 0 };

    // Bananas
    let bananas = [];
    for (let i = 0; i < 50; i++) {
      bananas.push({
        x: Math.floor(Math.random() * cols),
        y: Math.floor(Math.random() * rows)
      });
    }

    // Gorilas inimigos
    let gorillas = [
      { x: 10, y: 10, dx: 1, dy: 0 },
      { x: 15, y: 5, dx: 0, dy: 1 }
    ];

    let score = 0;
    let gameOver = false;

    function drawMonkey() {
      ctx.fillStyle = "orange";
      ctx.beginPath();
      ctx.arc(monkey.x * tileSize + tileSize/2, monkey.y * tileSize + tileSize/2, tileSize/2 - 2, 0, Math.PI*2);
      ctx.fill();
    }

    function drawBananas() {
      ctx.fillStyle = "yellow";
      bananas.forEach(b => {
        ctx.beginPath();
        ctx.arc(b.x * tileSize + tileSize/2, b.y * tileSize + tileSize/2, 5, 0, Math.PI*2);
        ctx.fill();
      });
    }

    function drawGorillas() {
      ctx.fillStyle = "brown";
      gorillas.forEach(g => {
        ctx.fillRect(g.x * tileSize, g.y * tileSize, tileSize, tileSize);
      });
    }

    function moveMonkey() {
      monkey.x += monkey.dx;
      monkey.y += monkey.dy;
      if (monkey.x < 0) monkey.x = cols-1;
      if (monkey.x >= cols) monkey.x = 0;
      if (monkey.y < 0) monkey.y = rows-1;
      if (monkey.y >= rows) monkey.y = 0;
    }

    function moveGorillas() {
      gorillas.forEach(g => {
        g.x += g.dx;
        g.y += g.dy;
        if (Math.random() < 0.05) {
          let dir = Math.floor(Math.random()*4);
          g.dx = dir === 0 ? 1 : dir === 1 ? -1 : 0;
          g.dy = dir === 2 ? 1 : dir === 3 ? -1 : 0;
        }
        if (g.x < 0) g.x = cols-1;
        if (g.x >= cols) g.x = 0;
        if (g.y < 0) g.y = rows-1;
        if (g.y >= rows) g.y = 0;
      });
    }

    function checkCollisions() {
      bananas = bananas.filter(b => {
        if (b.x === monkey.x && b.y === monkey.y) {
          document.getElementById("eatSound").play();
          score++;
          return false;
        }
        return true;
      });

      gorillas.forEach(g => {
        if (g.x === monkey.x && g.y === monkey.y) {
          document.getElementById("gameOverSound").play();
          gameOver = true;
        }
      });
    }

    function drawScore() {
      ctx.fillStyle = "white";
      ctx.font = "20px Arial";
      ctx.fillText("Bananas: " + score, 10, 20);
    }

    function gameLoop() {
      if (gameOver) {
        ctx.fillStyle = "red";
        ctx.font = "40px Arial";
        ctx.fillText("GAME OVER", canvas.width/2 - 100, canvas.height/2);
        return;
      }
      ctx.clearRect(0,0,canvas.width,canvas.height);
      moveMonkey();
      moveGorillas();
      checkCollisions();
      drawMonkey();
      drawBananas();
      drawGorillas();
      drawScore();
      requestAnimationFrame(gameLoop);
    }

    document.addEventListener("keydown", e => {
      if (e.key === "ArrowUp") { monkey.dx = 0; monkey.dy = -1; }
      if (e.key === "ArrowDown") { monkey.dx = 0; monkey.dy = 1; }
      if (e.key === "ArrowLeft") { monkey.dx = -1; monkey.dy = 0; }
      if (e.key === "ArrowRight") { monkey.dx = 1; monkey.dy = 0; }
    });

    gameLoop();
  </script>
</body>
</html>
